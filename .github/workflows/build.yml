name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          cache: true

      - name: Fetch App Dependencies
        run: flutter pub get

      - name: Patch Notification Package Conflict
        run: |
          flutter pub add flutter_local_notifications:17.3.0 --directory=.

      - name: Compile Production APK
        run: flutter build apk --release

      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-master-apk
          path: build/app/outputs/flutter-apk/app-release.apk
