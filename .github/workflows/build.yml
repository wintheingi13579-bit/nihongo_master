name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          cache: true

      - name: Patch Notification Package Conflict
        run: |
          echo -e "\ndependency_overrides:\n  flutter_local_notifications: ^17.2.4" >> pubspec.yaml

      - name: Generate Missing Project Assets
        run: |
          # Create the missing asset folders declared in pubspec
          mkdir -p assets/images assets/audio
          touch assets/images/.gitkeep assets/audio/.gitkeep
          
          # Create standard Android mipmap folder structures for the app icon
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # Download a temporary generic placeholder icon to satisfy the compiler
          curl -s -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png https://placeholder.co/72x72.png
          curl -s -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png https://placeholder.co/48x48.png
          curl -s -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png https://placeholder.co/96x96.png
          curl -s -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://placeholder.co/144x144.png
          curl -s -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://placeholder.co/192x192.png

      - name: Fetch App Dependencies
        run: flutter pub get

      - name: Compile Production APK
        run: flutter build apk --release

      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-master-apk
          path: build/app/outputs/flutter-apk/app-release.apk
